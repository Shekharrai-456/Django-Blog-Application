{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="row justify-content-center align-items-center" style="min-height: 75vh;">
        <div class="col-md-8 col-lg-6 text-center">
            
            <div class="error-visual mb-5">
                <h1 class="display-1 fw-black text-warning shadow-text" style="font-size: 8rem; font-family: 'Playfair Display', serif;">404</h1>
                <div class="error-icon-container">
                    <i class="fa-solid fa-ghost fa-4x text-light-emphasis position-absolute top-50 start-50 translate-middle opacity-25"></i>
                </div>
            </div>

            <h2 class="fw-bold mb-3 text-dark">Oops! Page Not Found</h2>
            <p class="text-muted mb-5 fs-5">
                The story you are looking for has either moved, been deleted, or never existed in this universe. Don't worry, we can get you back on track.
            </p>

            <div class="d-flex flex-column flex-sm-row justify-content-center gap-3">
                <a href="/" class="btn btn-warning btn-lg px-4 fw-bold text-white rounded-pill shadow-sm transition-hover">
                    <i class="fa-solid fa-house me-2"></i> Go Home
                </a>
                <button onclick="history.back()" class="btn btn-outline-dark btn-lg px-4 rounded-pill">
                    <i class="fa-solid fa-arrow-left me-2"></i> Go Back
                </a>
            </div>

            <div class="mt-5 pt-4 border-top">
                <p class="small text-muted text-uppercase fw-bold" style="letter-spacing: 1.5px;">Try searching for a topic</p>
                <form action="{% url 'search' %}" method="GET" class="col-md-8 mx-auto mt-3">
                    <div class="input-group">
                        <input type="text" name="keyword" class="form-control rounded-start-pill border-end-0 px-4" placeholder="Search articles...">
                        <button class="btn btn-warning rounded-end-pill px-4 text-white" type="submit">
                            <i class="fa fa-search"></i>
                        </button>
                    </div>
                </form>
            </div>

        </div>
    </div>
</div>

<style>
    /* 404 Specific Styles */
    .fw-black {
        font-weight: 900;
    }
    
    .shadow-text {
        text-shadow: 10px 10px 0px rgba(243, 156, 18, 0.1);
    }

    .error-visual {
        position: relative;
        display: inline-block;
    }

    .transition-hover {
        transition: all 0.3s ease;
    }

    .transition-hover:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 15px rgba(243, 156, 18, 0.3) !important;
    }

    /* Pulse animation for the ghost icon */
    .fa-ghost {
        animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
        0%, 100% { transform: translate(-50%, -50%); }
        50% { transform: translate(-50%, -65%); }
    }

    /* Responsive adjustments */
    @media (max-width: 576px) {
        h1.display-1 {
            font-size: 5rem !important;
        }
    }
</style>
{% endblock %}
